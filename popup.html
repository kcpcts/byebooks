<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<script src="popup.js" type="text/javascript"></script>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface-hi: #1c2129;
        --border: #30363d;
        --border-hi: #545d68;
        --text: #e6edf3;
        --dim: #7d8590;
        --green: #39d353;
        --red: #f85149;
        --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI",
            system-ui, sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", ui-monospace,
            "Menlo", "Consolas", monospace;
    }

    html, body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 13px;
        line-height: 1.4;
        letter-spacing: -0.005em;
    }

    body {
        width: 320px;
        padding-bottom: 8px;
    }

    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 12px;
        border-bottom: 1px solid var(--border);
    }
    .brand {
        display: flex;
        align-items: baseline;
        gap: 8px;
    }
    .brand-name {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.02em;
    }
    .brand-version {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--dim);
        letter-spacing: 0;
    }

    .progress {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .progress-ring {
        width: 32px;
        height: 32px;
        position: relative;
    }
    .progress-ring svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
    }
    .progress-ring .fill {
        transition: stroke-dashoffset 0.35s ease, stroke 0.25s;
    }
    .progress-ring.complete .fill { stroke: var(--green); }
    .progress-pct {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        min-width: 30px;
        text-align: right;
    }

    .status {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--dim);
    }
    .status-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--dim);
    }
    .status.live .status-dot {
        background: var(--green);
        animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(57,211,83,0.55); }
        50%      { box-shadow: 0 0 0 5px rgba(57,211,83,0); }
    }

    .section-label {
        padding: 12px 16px 4px;
        font-family: var(--font-mono);
        font-size: 9.5px;
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .actions {
        padding: 6px 10px;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .btn {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 9px 12px;
        cursor: pointer;
        text-align: left;
        font-family: inherit;
        color: inherit;
        transition: background 0.1s, border-color 0.1s, transform 0.05s;
        display: block;
        width: 100%;
    }
    .btn:hover {
        background: var(--surface-hi);
        border-color: var(--border-hi);
    }
    .btn:active { transform: translateY(1px); }
    .btn-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
    }
    .btn-caption {
        font-size: 10.5px;
        color: var(--dim);
        margin-top: 2px;
        font-family: var(--font-mono);
    }

    .btn.primary {
        background: var(--text);
        color: var(--bg);
        border-color: var(--text);
    }
    .btn.primary:hover { background: #fff; border-color: #fff; }
    .btn.primary .btn-caption { color: rgba(13,17,23,0.55); }

    .btn.danger {
        color: var(--red);
        border-color: rgba(248,81,73,0.28);
    }
    .btn.danger:hover {
        background: rgba(248,81,73,0.08);
        border-color: var(--red);
    }
    .btn.danger .btn-caption { color: rgba(248,81,73,0.55); }

    .footer {
        padding: 12px 16px 4px;
        font-family: var(--font-mono);
        font-size: 9.5px;
        color: var(--dim);
        text-align: center;
        opacity: 0.55;
    }
</style>
</head>
<body>

<div class="header">
    <div class="brand">
        <span class="brand-name">ByeBooks</span>
        <span class="brand-version">v3.0</span>
    </div>
    <div class="progress" id="progress" title="Page progress">
        <div class="progress-ring" id="progressRing">
            <svg viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="13" stroke="var(--border)" stroke-width="3" fill="none"/>
                <circle id="ringFill" class="fill" cx="16" cy="16" r="13" stroke="var(--text)" stroke-width="3" fill="none"
                    stroke-dasharray="81.681" stroke-dashoffset="81.681" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="progress-pct" id="progressPct">--</span>
    </div>
</div>

<div class="status" id="status">
    <span class="status-dot"></span>
    <span id="statusText">awaiting page&hellip;</span>
</div>

<div class="actions">
    <button class="btn primary" id="solveAuto">
        <div class="btn-title">Auto Solve</div>
        <div class="btn-caption">Runs every solver and advances when all activities are complete.</div>
    </button>
    <button class="btn" id="solveAll">
        <div class="btn-title">All On Page</div>
        <div class="btn-caption">Runs each solver once on this page only.</div>
    </button>
</div>

<div class="section-label">// Targeted solvers</div>

<div class="actions">
    <button class="btn" id="solveAnimations">
        <div class="btn-title">Animations</div>
        <div class="btn-caption">Enables 2x speed and advances each step automatically.</div>
    </button>
    <button class="btn" id="solveMC">
        <div class="btn-title">Multiple Choice</div>
        <div class="btn-caption">Selects one option per question.</div>
    </button>
    <button class="btn" id="solveSA">
        <div class="btn-title">Short Answer</div>
        <div class="btn-caption">Shows answers, fills in correct answer, and checks.</div>
    </button>
    <button class="btn" id="solveMatch">
        <div class="btn-title">Drag &amp; Drop</div>
        <div class="btn-caption">Greedily tries placements until each slot accepts.</div>
    </button>
    <button class="btn" id="solveBlocks">
        <div class="btn-title">Block Ordering</div>
        <div class="btn-caption">Orders blocks in the correct sequence.</div>
    </button>
</div>

<div class="section-label">// Control</div>

<div class="actions">
    <button class="btn danger" id="stopAll">
        <div class="btn-title">Stop All</div>
        <div class="btn-caption">Clears timers and immediately stops all automation.</div>
    </button>
</div>

<div class="footer">// learn.zybooks.com</div>

</body>
</html>
